<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Schedule</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* NAV */
.nav {
    background: #205081;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
}
.nav img { height: 35px; cursor: pointer; }

/* TERM BAR */
.term-bar {
    background: linear-gradient(135deg,#205081,#2d6fa3);
    padding: 15px 20px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* MAIN */
.main {
    flex: 1;
    display: grid;
    grid-template-columns: 1.3fr 2fr;
}

/* LEFT */
.left {
    padding: 20px;
    overflow-y: auto;
}

.schedule-card {
    background: white;
    padding: 15px;
    margin-bottom: 12px;
    border-left: 5px solid #2196f3;
    border-radius: 8px;
    cursor: pointer;
}

.schedule-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* CALENDAR */
.calendar {
    padding: 20px;
    background: linear-gradient(135deg,#c8e6c9,#a5d6a7);
}

.calendar-header {
    display: grid;
    grid-template-columns: repeat(7,1fr);
}

.calendar-day-name {
    text-align: center;
    font-weight: bold;
}

.month {
    background: white;
    padding: 10px;
    border-radius: 8px;
    display: grid;
    grid-template-columns: repeat(7,1fr);
    gap: 4px;
}

.day {
    min-height: 90px;
    border: 1px solid #ddd;
    font-size: 10px;
    padding: 4px;
}

.tag {
    font-size: 9px;
    padding: 2px;
    margin-top: 2px;
    border-radius: 3px;
    color: white;
    cursor: pointer;
}

/* MODAL */
.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:white;
    width:520px;
    border-radius:10px;
    overflow:hidden;
}

.modal-header {
    background:#205081;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
}

.close-btn {
    background:none;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}

.modal-tabs {
    display:flex;
    border-bottom:2px solid #ddd;
}

.modal-tab {
    flex:1;
    padding:12px;
    cursor:pointer;
}

.modal-tab.active {
    border-bottom:3px solid #205081;
    font-weight:bold;
}

.modal-body {
    padding:20px;
}

.tab-content { display:none; }
.tab-content.active { display:block; }

.info-row {
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

.info-label {
    font-weight:bold;
    color:#205081;
    width:40%;
}

.info-value {
    width:60%;
}

.modal-actions {
    padding:15px;
    border-top:1px solid #ddd;
}
</style>
</head>

<body>

<div class="nav">
    <img src="../Images/logo.png">
    <img src="../Images/account.png" onclick="window.location.href='homepage.html'">
</div>

<div class="term-bar">
    <div>My Schedule</div>
    <select>
        <option>Fall 2026</option>
        <option>Spring 2027</option>
    </select>
</div>

<div class="main">

<div class="left" id="scheduleList"></div>

<div class="calendar">
    <div class="calendar-header" id="header"></div>
    <div class="month" id="month"></div>
</div>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

/* DATA */
const classes = [
{
name:"CS101",
title:"Intro to Computer Science",
crn:"12345",
days:["mon","wed","fri"],
time:"10:30 AM - 12:00 PM",
room:"Tech 201",
professor:"Dr. Smith",
credits:3,
description:"Intro to programming and problem solving.",
capacity:30,
enrolled:28,
prerequisites:"None",
color:"#ff6b6b"
},
{
name:"MATH202",
title:"Calculus II",
crn:"67890",
days:["tue","thu"],
time:"3:00 PM - 4:15 PM",
room:"Sci 105",
professor:"Dr. Johnson",
credits:4,
description:"Integration techniques and series.",
capacity:35,
enrolled:32,
prerequisites:"Calculus I",
color:"#4dabf7"
}
];

/* HEADER */
const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const header=document.getElementById("header");

dayNames.forEach(d=>{
let el=document.createElement("div");
el.className="calendar-day-name";
el.innerText=d;
header.appendChild(el);
});

/* CALENDAR */
const month=document.getElementById("month");

for(let i=1;i<=30;i++){
let d=document.createElement("div");
d.className="day";
d.innerHTML="<b>"+i+"</b>";

classes.forEach(c=>{
if(
(i%7===1 && c.days.includes("mon")) ||
(i%7===2 && c.days.includes("tue")) ||
(i%7===3 && c.days.includes("wed")) ||
(i%7===4 && c.days.includes("thu")) ||
(i%7===5 && c.days.includes("fri"))
){
let tag=document.createElement("div");
tag.className="tag";
tag.style.background=c.color;
tag.innerText=c.name;
tag.onclick=()=>openModal(c);
d.appendChild(tag);
}
});

month.appendChild(d);
}

/* LEFT PANEL */
const list=document.getElementById("scheduleList");

classes.forEach(c=>{
let card=document.createElement("div");
card.className="schedule-card";
card.innerHTML=`
<b>${c.name}</b><br>
${c.title}<br>
${c.time}
`;
card.onclick=()=>openModal(c);
list.appendChild(card);
});

/* MODAL (EXACT VERSION) */
function openModal(c){
const modal=document.getElementById("modal");
const modalContent=document.getElementById("modalContent");

const daysStr=c.days.join(", ");

modalContent.innerHTML=`
<div class="modal-header">
<div>
<h3>${c.name}</h3>
<div style="font-size:14px;">CRN: ${c.crn}</div>
</div>
<button class="close-btn" onclick="closeModal()">×</button>
</div>

<div class="modal-tabs">
<button class="modal-tab active" onclick="switchModalTab(event,'details')">Details</button>
<button class="modal-tab" onclick="switchModalTab(event,'schedule')">Schedule</button>
<button class="modal-tab" onclick="switchModalTab(event,'instructor')">Instructor</button>
<button class="modal-tab" onclick="switchModalTab(event,'prerequisites')">Prerequisites</button>
</div>

<div class="modal-body">

<div id="details" class="tab-content active">
<div class="info-row"><div class="info-label">Course Title:</div><div class="info-value">${c.title}</div></div>
<div class="info-row"><div class="info-label">Course Code:</div><div class="info-value">${c.name}</div></div>
<div class="info-row"><div class="info-label">CRN:</div><div class="info-value">${c.crn}</div></div>
<div class="info-row"><div class="info-label">Credits:</div><div class="info-value">${c.credits}</div></div>
<div class="info-row"><div class="info-label">Location:</div><div class="info-value">${c.room}</div></div>
<div class="info-row"><div class="info-label">Description:</div><div class="info-value">${c.description}</div></div>
</div>

<div id="schedule" class="tab-content">
<div class="info-row"><div class="info-label">Days:</div><div class="info-value">${daysStr}</div></div>
<div class="info-row"><div class="info-label">Time:</div><div class="info-value">${c.time}</div></div>
<div class="info-row"><div class="info-label">Room:</div><div class="info-value">${c.room}</div></div>
<div class="info-row"><div class="info-label">Capacity:</div><div class="info-value">${c.enrolled}/${c.capacity}</div></div>
</div>

<div id="instructor" class="tab-content">
<div class="info-row"><div class="info-label">Instructor:</div><div class="info-value">${c.professor}</div></div>
</div>

<div id="prerequisites" class="tab-content">
<div class="info-row"><div class="info-label">Prerequisites:</div><div class="info-value">${c.prerequisites}</div></div>
</div>

</div>

<div class="modal-actions">
<button onclick="closeModal()">Close</button>
</div>
`;

modal.style.display="flex";
}

function switchModalTab(e,id){
document.querySelectorAll(".modal-tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
e.target.classList.add("active");
document.getElementById(id).classList.add("active");
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>z
